<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MST Algorithms Challenge</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&family=JetBrains+Mono:wght@400;700&display=swap');
        
        body {
            font-family: 'Inter', sans-serif;
            background-color: #0f172a;
            color: #f8fafc;
            overflow: hidden;
        }

        .code-font {
            font-family: 'JetBrains Mono', monospace;
        }

        canvas {
            cursor: crosshair;
            background: radial-gradient(circle at center, #1e293b 0%, #0f172a 100%);
            box-shadow: inset 0 0 50px rgba(0,0,0,0.5);
        }

        /* Custom Scrollbar */
        ::-webkit-scrollbar { height: 6px; width: 6px; }
        ::-webkit-scrollbar-track { background: #1e293b; border-radius: 4px; }
        ::-webkit-scrollbar-thumb { background: #475569; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #64748b; }

        .toast-enter { animation: slideIn 0.3s cubic-bezier(0.16, 1, 0.3, 1) forwards; }
        .toast-exit { animation: slideOut 0.3s cubic-bezier(0.16, 1, 0.3, 1) forwards; }

        @keyframes slideIn { from { transform: translateX(100%); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
        @keyframes slideOut { from { transform: translateX(0); opacity: 1; } to { transform: translateX(100%); opacity: 0; } }

        .shake { animation: shake 0.4s cubic-bezier(.36,.07,.19,.97) both; }
        @keyframes shake {
            10%, 90% { transform: translate3d(-1px, 0, 0); }
            20%, 80% { transform: translate3d(2px, 0, 0); }
            30%, 50%, 70% { transform: translate3d(-4px, 0, 0); }
            40%, 60% { transform: translate3d(4px, 0, 0); }
        }

        .tab-active { background-color: #4f46e5; color: white; box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1); }
        .tab-inactive { background-color: transparent; color: #94a3b8; }
        .tab-inactive:hover { color: #f8fafc; background-color: #334155; }
    </style>
</head>
<body class="h-screen w-screen flex flex-col">

    <!-- Header -->

        <div>

            <p class="text-slate-400 text-sm mt-1">Select valid edges to construct the Minimum Spanning Tree.</p>
        </div>
        
        <!-- Algorithm Navigation -->
        <div class="flex bg-slate-800 p-1 rounded-lg border border-slate-700 mx-4">
            <button onclick="setAlgorithm('prim')" id="btn-prim" class="px-6 py-2 rounded-md font-semibold text-sm transition-all tab-active">
                Prim's Algorithm
            </button>
            <button onclick="setAlgorithm('kruskal')" id="btn-kruskal" class="px-6 py-2 rounded-md font-semibold text-sm transition-all tab-inactive">
                Kruskal's Algorithm
            </button>
        </div>

        <div class="flex gap-4 items-center">
            <select id="level-selector" onchange="changeLevel()" class="bg-slate-900 border border-slate-700 text-emerald-400 font-semibold px-4 py-2 rounded-lg cursor-pointer hover:bg-slate-800 transition-colors focus:outline-none focus:ring-2 focus:ring-emerald-500">

                <option value="1">Pattern 2: The Hourglass</option>
                <option value="2">Pattern 3: The Labyrinth</option>
                <option value="3">Pattern 4: The Twin Islands</option>
                <option value="4">Pattern 5: The Double Helix</option>
                <option value="5">Pattern 6: The Tesseract</option>
                <option value="6">Pattern 7: The Royal Crown</option>
                <option value="7">Pattern 8: Stellar Snowflake</option>
                <option value="8">Pattern 9: The Starfighter</option>

                <span class="text-slate-400 text-xs font-semibold uppercase">Total Cost</span>
                <span id="cost-display" class="text-emerald-400 font-bold code-font text-lg leading-none mt-1">0</span>
            </div>
            <div class="bg-slate-800 px-4 py-2 rounded-lg border border-slate-700 flex flex-col items-center justify-center">

            </div>

    </header>

                title: "Kruskal's Algorithm",
                content: `
                    <p><strong>What is it?</strong> A greedy algorithm that finds a minimum spanning tree by treating every node as an individual tree and merging them together into a single forest.</p>
                    <p><strong>How it works:</strong> Sorts all edges in the graph by weight. It iterates through the sorted edges and adds the lowest weight edge to the MST, <em>provided that adding it does not form a cycle</em>. It uses a Disjoint Set (Union-Find) to check for cycles.</p>
                    <p><strong>When to use:</strong> Extremely efficient for sparse graphs (fewer edges). Edges are sorted first, making it robust.</p>
                `
            }
        };

        // --- Initialization ---
        function init() {
            resizeCanvas();
            window.addEventListener('resize', resizeCanvas);
            canvas.addEventListener('mousemove', handleMouseMove);
            canvas.addEventListener('click', handleMouseClick);
            
            setAlgorithm('prim');
        }

        function setAlgorithm(algo) {
            currentAlgorithm = algo;
            
            // Update Buttons
            document.getElementById('btn-prim').className = `px-6 py-2 rounded-md font-semibold text-sm transition-all ${algo === 'prim' ? 'tab-active' : 'tab-inactive'}`;
            document.getElementById('btn-kruskal').className = `px-6 py-2 rounded-md font-semibold text-sm transition-all ${algo === 'kruskal' ? 'tab-active' : 'tab-inactive'}`;
            
            // Update UI Theory
            document.getElementById('theory-title').innerHTML = THEORY[algo].title;
            document.getElementById('theory-content').innerHTML = THEORY[algo].content;

            const rulesContainer = document.getElementById('rules-content');
            if (algo === 'prim') {
                document.getElementById('nodes-panel-title').innerText = "Visited Nodes";
                rulesContainer.innerHTML = `
                    <li class="flex items-start gap-2">
                        <div class="w-1.5 h-1.5 rounded-full bg-slate-500 mt-1.5 flex-shrink-0"></div>
                        <span>Start at the pre-selected node <strong id="instruction-start-node" class="text-indigo-400"></strong>.</span>
                    </li>
                    <li class="flex items-start gap-2">
                        <div class="w-1.5 h-1.5 rounded-full bg-slate-500 mt-1.5 flex-shrink-0"></div>
                        <span>Click an edge that connects a <strong class="text-emerald-400">visited</strong> node to an <strong class="text-slate-100">unvisited</strong> node.</span>
                    </li>
                    <li class="flex items-start gap-2">
                        <div class="w-1.5 h-1.5 rounded-full bg-slate-500 mt-1.5 flex-shrink-0"></div>
                        <span>You <strong>must</strong> select the edge with the <strong>minimum weight</strong> available in the frontier.</span>
                    </li>
                    <li class="flex items-start gap-2">
                        <div class="w-1.5 h-1.5 rounded-full bg-rose-500 mt-1.5 flex-shrink-0"></div>
                        <span>Watch out for ties and potential cycles!</span>
                    </li>
                `;
            } else {
                document.getElementById('nodes-panel-title').innerText = "Connected Nodes";
                rulesContainer.innerHTML = `
                    <li class="flex items-start gap-2">
                        <div class="w-1.5 h-1.5 rounded-full bg-slate-500 mt-1.5 flex-shrink-0"></div>
                        <span>Review <strong>all</strong> available edges across the entire graph.</span>
                    </li>
                    <li class="flex items-start gap-2">
                        <div class="w-1.5 h-1.5 rounded-full bg-slate-500 mt-1.5 flex-shrink-0"></div>
                        <span>Select the absolute <strong>minimum weight</strong> edge remaining in the graph.</span>
                    </li>
                    <li class="flex items-start gap-2">
                        <div class="w-1.5 h-1.5 rounded-full bg-slate-500 mt-1.5 flex-shrink-0"></div>
                        <span>If an edge forms a <strong class="text-rose-400">cycle</strong>, it is invalid. Skip it and find the next lowest.</span>
                    </li>
                    <li class="flex items-start gap-2">
                        <div class="w-1.5 h-1.5 rounded-full bg-rose-500 mt-1.5 flex-shrink-0"></div>
                        <span>You do NOT need to connect to an already visited node. Build the forest!</span>
                    </li>
                `;
            }

            resetGame();
        }

        function changeLevel() {
            currentLevelIndex = parseInt(document.getElementById('level-selector').value);
            resetGame();
        }

        function resetGame() {
            const level = levels[currentLevelIndex];
            START_NODE = level.start;
            
            document.getElementById('total-nodes-count').innerText = level.nodes.length;
            
            if (currentAlgorithm === 'prim') {
                const startNodeEl = document.getElementById('instruction-start-node');
                if(startNodeEl) startNodeEl.innerText = START_NODE;
            }
            
            visitedNodes.clear();
            mstEdges.clear();
            totalCost = 0;
            mistakes = 0;
            hoveredEdge = null;
            errorEdge = null;
            
            gNodes = level.nodes.map(n => ({ ...n }));
            gEdges = level.edges.map(e => ({ ...e, id: `${e.u}-${e.v}` }));

            if (currentAlgorithm === 'prim') {
                visitedNodes.add(START_NODE);
            } else {
                parentMap = {};
                gNodes.forEach(n => parentMap[n.id] = n.id);
            }

            document.getElementById('action-log').innerHTML = '';
            document.getElementById('win-overlay').classList.add('hidden');
            document.getElementById('win-overlay').classList.remove('flex');
            
            if(currentAlgorithm === 'prim') {
                logAction(`Loaded ${level.name} (Prim's). Node ${START_NODE} selected automatically.`, 'info');
            } else {
                logAction(`Loaded ${level.name} (Kruskal's). Pick the global minimum edge.`, 'info');
            }
            
            updateUI();
            requestAnimationFrame(draw);
        }

        // --- Kruskal's Union-Find Logic ---
        function findSet(i) {
            if (parentMap[i] === i) return i;
            return parentMap[i] = findSet(parentMap[i]);
        }

        function unionSets(i, j) {
            let rootI = findSet(i);
            let rootJ = findSet(j);
            if (rootI !== rootJ) {
                parentMap[rootI] = rootJ;
            }
        }

        // --- Validations ---
        function validatePrimEdge(edge) {
            if (mstEdges.has(edge.id)) return { valid: false, msg: "Edge is already in the MST." };

            const uVis = visitedNodes.has(edge.u);
            const vVis = visitedNodes.has(edge.v);

            if (uVis && vVis) return { valid: false, msg: "Cycle detected! Both nodes are already visited." };
            if (!uVis && !vVis) return { valid: false, msg: "Edge is entirely disconnected from the current tree." };

            const frontier = gEdges.filter(e => {
                const uV = visitedNodes.has(e.u);
                const vV = visitedNodes.has(e.v);
                return (uV && !vV) || (!uV && vV);
            });
            const minWeight = Math.min(...frontier.map(e => e.weight));

            if (edge.weight > minWeight) {
                return { valid: false, msg: `Incorrect! There is a cheaper edge available in the frontier (Weight: ${minWeight}).` };
            }
            return { valid: true, msg: "Valid edge selected." };
        }

        function validateKruskalEdge(edge) {
            if (mstEdges.has(edge.id)) return { valid: false, msg: "Edge is already in the MST." };
            if (findSet(edge.u) === findSet(edge.v)) return { valid: false, msg: "Cycle detected! These nodes are already connected." };

            // Find global minimum of VALID remaining edges
            let minAvailable = Infinity;
            gEdges.forEach(e => {
                if (!mstEdges.has(e.id) && findSet(e.u) !== findSet(e.v)) {
                    minAvailable = Math.min(minAvailable, e.weight);
                }
            });

            if (edge.weight > minAvailable) {
                return { valid: false, msg: `Not the minimum valid edge! Minimum available weight is ${minAvailable}.` };
            }

            return { valid: true, msg: "Valid edge selected." };
        }

        // --- Interaction ---
        function resizeCanvas() {
            const rect = container.getBoundingClientRect();
            width = rect.width;
            height = rect.height;
            canvas.width = width * window.devicePixelRatio;
            canvas.height = height * window.devicePixelRatio;
            ctx.scale(window.devicePixelRatio, window.devicePixelRatio);
            scale = Math.min(width / LOGICAL_WIDTH, height / LOGICAL_HEIGHT) * 0.9;
            requestAnimationFrame(draw);
        }

        function getMousePos(e) {
            const rect = canvas.getBoundingClientRect();
            return { x: e.clientX - rect.left, y: e.clientY - rect.top };
        }

        function handleMouseMove(e) {
            const mousePos = getMousePos(e);
            let closestEdge = null;
            let minDist = 15;

            const offsetX = (width - LOGICAL_WIDTH * scale) / 2;
            const offsetY = (height - LOGICAL_HEIGHT * scale) / 2;
            const transform = p => ({ x: p.x * scale + offsetX, y: p.y * scale + offsetY });

            gEdges.forEach(edge => {
                const nodeU = gNodes.find(n => n.id === edge.u);
                const nodeV = gNodes.find(n => n.id === edge.v);
                const p1 = transform(nodeU);
                const p2 = transform(nodeV);
                
                let l2 = Math.pow(p1.x - p2.x, 2) + Math.pow(p1.y - p2.y, 2);
                let dist = 1000;
                if (l2 !== 0) {
                    let t = ((mousePos.x - p1.x) * (p2.x - p1.x) + (mousePos.y - p1.y) * (p2.y - p1.y)) / l2;
                    t = Math.max(0, Math.min(1, t));
                    dist = Math.sqrt(Math.pow(mousePos.x - (p1.x + t * (p2.x - p1.x)), 2) + Math.pow(mousePos.y - (p1.y + t * (p2.y - p1.y)), 2));
                }
                
                if (dist < minDist) {
                    minDist = dist;
                    closestEdge = edge;
                }
            });

            if (hoveredEdge !== closestEdge) {
                hoveredEdge = closestEdge;
                canvas.style.cursor = hoveredEdge ? 'pointer' : 'crosshair';
                requestAnimationFrame(draw);
            }
        }

        function handleMouseClick(e) {
            if (!hoveredEdge || mstEdges.size === gNodes.length - 1) return;

            const validation = currentAlgorithm === 'prim' ? validatePrimEdge(hoveredEdge) : validateKruskalEdge(hoveredEdge);

            if (validation.valid) {
                mstEdges.add(hoveredEdge.id);
                visitedNodes.add(hoveredEdge.u);
                visitedNodes.add(hoveredEdge.v);
                totalCost += hoveredEdge.weight;
                
                if (currentAlgorithm === 'kruskal') {
                    unionSets(hoveredEdge.u, hoveredEdge.v);
                }
                
                logAction(`Added edge (${hoveredEdge.u}-${hoveredEdge.v}) with weight ${hoveredEdge.weight}.`, 'success');
                showToast(`Correct! Added ${hoveredEdge.u}-${hoveredEdge.v}`, 'success');
                
                checkWinCondition();
            } else {
                mistakes++;
                errorEdge = hoveredEdge;
                
                logAction(`Failed to add (${hoveredEdge.u}-${hoveredEdge.v}): ${validation.msg}`, 'error');
                showToast(validation.msg, 'error');
                
                canvas.classList.add('shake');
                setTimeout(() => canvas.classList.remove('shake'), 400);

                if (errorTimeout) clearTimeout(errorTimeout);
                errorTimeout = setTimeout(() => {
                    errorEdge = null;
                    requestAnimationFrame(draw);
                }, 1000);
            }

            updateUI();
            requestAnimationFrame(draw);
        }

        function checkWinCondition() {
            if (mstEdges.size === gNodes.length - 1) {
                setTimeout(() => {
                    document.getElementById('final-cost').innerText = totalCost;
                    document.getElementById('final-mistakes').innerText = mistakes;
                    document.getElementById('win-title').innerText = `${currentAlgorithm === 'prim' ? "Prim's" : "Kruskal's"} Complete!`;
                    const overlay = document.getElementById('win-overlay');
                    overlay.classList.remove('hidden');
                    overlay.classList.add('flex');
                    logAction(`MST Built! Final Cost: ${totalCost}`, 'info');
                }, 500);
            }
        }

        // --- Drawing ---
        function draw() {
            ctx.clearRect(0, 0, width, height);

            const offsetX = (width - LOGICAL_WIDTH * scale) / 2;
            const offsetY = (height - LOGICAL_HEIGHT * scale) / 2;
            const transform = p => ({ x: p.x * scale + offsetX, y: p.y * scale + offsetY });

            // 1. Draw Edges
            gEdges.forEach(edge => {
                const isMST = mstEdges.has(edge.id);
                const isHovered = hoveredEdge && hoveredEdge.id === edge.id;
                const isError = errorEdge && errorEdge.id === edge.id;

                const nodeU = gNodes.find(n => n.id === edge.u);
                const nodeV = gNodes.find(n => n.id === edge.v);
                const p1 = transform(nodeU);
                const p2 = transform(nodeV);

                ctx.beginPath();
                ctx.moveTo(p1.x, p1.y);
                ctx.lineTo(p2.x, p2.y);

                if (isError) {
                    ctx.strokeStyle = COLORS.edgeError;
                    ctx.lineWidth = 4 * scale;
                } else if (isMST) {
                    ctx.strokeStyle = COLORS.edgeMST;
                    ctx.lineWidth = 4 * scale;
                } else if (isHovered) {
                    ctx.strokeStyle = COLORS.edgeHover;
                    ctx.lineWidth = 3 * scale;
                } else {
                    ctx.strokeStyle = COLORS.edgeDefault;
                    ctx.lineWidth = 2 * scale;
                }
                
                ctx.stroke();

                // Draw Weight
                const midX = (p1.x + p2.x) / 2;
                const midY = (p1.y + p2.y) / 2;
                
                ctx.fillStyle = COLORS.weightBg;
                ctx.beginPath();
                ctx.arc(midX, midY, 12 * scale, 0, Math.PI * 2);
                ctx.fill();

                if (isError) ctx.fillStyle = COLORS.weightTextError;
                else if (isMST) ctx.fillStyle = COLORS.weightTextMST;
                else ctx.fillStyle = isHovered ? '#fff' : COLORS.weightText;
                
                ctx.font = `bold ${14 * scale}px 'JetBrains Mono'`;
                ctx.textAlign = 'center';
                ctx.textBaseline = 'middle';
                ctx.fillText(edge.weight, midX, midY);
            });

            // 2. Draw Nodes
            gNodes.forEach(node => {
                const p = transform(node);
                const isVisited = visitedNodes.has(node.id);

                ctx.beginPath();
                ctx.arc(p.x, p.y, 20 * scale, 0, Math.PI * 2);
                ctx.fillStyle = isVisited ? COLORS.nodeVisited : COLORS.nodeDefault;
                ctx.fill();
                
                ctx.lineWidth = 2 * scale;
                if (currentAlgorithm === 'prim' && node.id === START_NODE && !isVisited) {
                    ctx.strokeStyle = '#818cf8'; 
                    ctx.lineWidth = 4 * scale;
                } else {
                    ctx.strokeStyle = isVisited ? COLORS.edgeMST : COLORS.nodeBorder;
                }
                ctx.stroke();

                ctx.fillStyle = COLORS.nodeText;
                ctx.font = `bold ${16 * scale}px 'Inter'`;
                ctx.textAlign = 'center';
                ctx.textBaseline = 'middle';
                ctx.fillText(node.id, p.x, p.y);
            });
        }

        // --- UI Updates ---
        function updateUI() {
            document.getElementById('cost-display').innerText = totalCost;
            document.getElementById('mistakes-display').innerText = mistakes;
            document.getElementById('visited-count').innerText = visitedNodes.size;

            const visitedContainer = document.getElementById('visited-nodes-container');
            visitedContainer.innerHTML = '';
            
            const sortedNodes = Array.from(visitedNodes).sort();
            
            sortedNodes.forEach(n => {
                const el = document.createElement('div');
                el.className = 'w-8 h-8 rounded-full bg-indigo-600 text-white flex items-center justify-center text-sm font-bold border-2 border-indigo-400 shadow-[0_0_10px_rgba(79,70,229,0.5)]';
                el.innerText = n;
                visitedContainer.appendChild(el);
            });
        }

        function logAction(msg, type) {
            const logContainer = document.getElementById('action-log');
            const el = document.createElement('div');
            
            let colorClass = 'text-slate-400';
            let icon = '>';
            if (type === 'success') {
                colorClass = 'text-emerald-400';
                icon = '+';
            } else if (type === 'error') {
                colorClass = 'text-rose-400';
                icon = 'x';
            } else if (type === 'info') {
                colorClass = 'text-indigo-400';
                icon = 'i';
            }

            el.innerHTML = `<span class="opacity-50 mr-2">${icon}</span><span class="${colorClass}">${msg}</span>`;
            logContainer.appendChild(el);
            logContainer.scrollTop = logContainer.scrollHeight;
        }

        function showToast(msg, type) {
            const container = document.getElementById('toast-container');
            const toast = document.createElement('div');
            
            const bgClass = type === 'success' ? 'bg-emerald-900/90 border-emerald-500 text-emerald-100' : 'bg-rose-900/90 border-rose-500 text-rose-100';
            const icon = type === 'success' 
                ? `<svg class="w-5 h-5 text-emerald-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"></path></svg>`
                : `<svg class="w-5 h-5 text-rose-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path></svg>`;

            toast.className = `flex items-center gap-3 px-4 py-3 rounded-lg border shadow-lg backdrop-blur-sm toast-enter ${bgClass} max-w-sm`;
            toast.innerHTML = `${icon} <span class="text-sm font-medium leading-tight">${msg}</span>`;
            
            container.appendChild(toast);

            setTimeout(() => {
                toast.classList.replace('toast-enter', 'toast-exit');
                setTimeout(() => toast.remove(), 300);
            }, 3000);
        }

        // Start everything
        window.onload = init;

    </script>
</body>
</html>
