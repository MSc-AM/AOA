<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Graph Structure Visualization</title>
    <style>
        /* Base reset and white background */
        body {
            margin: 0;
            padding: 4rem 2rem;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            background-color: #ffffff; /* Complete white background */
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        }

        /* Main layout wrapper */
        .page-container {
            width: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 5rem;
        }

        /* Visual separator between the graphs */
        .divider {
            width: 100%;
            max-width: 600px;
            height: 1px;
            background-color: #000000; /* Changed to complete black */
            border-radius: 2px;
        }

        /* Container to keep graphs responsive */
        .graph-container {
            width: 100%;
            max-width: 900px; 
            display: flex;
            justify-content: center;
        }

        svg {
            width: 100%;
            height: 100%;
            display: block;
        }

        /* Styling for the paths (Edges) */
        .edge {
            stroke: #000000; /* Complete black */
            stroke-width: 1.5; /* Thin line */
            fill: none; /* Crucial for curved paths */
            transition: stroke 0.3s ease;
        }

        .edge:hover {
            stroke: #000000; /* Removed gray hover */
        }

        /* Styling for the Nodes */
        .node {
            fill: #ffffff;
            stroke: #000000; /* Complete black border */
            stroke-width: 3; /* Increased thickness for the circle */
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .node:hover {
            stroke: #000000;
            fill: #ffffff; /* Removed gray hover */
        }

        .node-text {
            fill: #000000; /* Complete black */
            font-size: 22px;
            font-weight: normal; /* Removed bold */
            text-anchor: middle;
            dominant-baseline: central;
            pointer-events: none; /* Let hover events pass through to circle */
        }

        /* Styling for the Weights */
        .weight-text {
            fill: #000000; /* Complete black */
            font-size: 16px;
            font-weight: normal; /* Removed bold */
            text-anchor: middle;
            dominant-baseline: central;
            pointer-events: none;
            /* White halo so the line underneath doesn't strike through the number */
            stroke: #ffffff;
            stroke-width: 4px; /* Thinner halo */
            stroke-linejoin: round;
            paint-order: stroke fill;
        }
    </style>
</head>
<body>

    <div class="page-container">
        <!-- FIRST GRAPH (Landscape a to z) -->
        <div class="graph-container">
            <svg id="graph-svg-1" viewBox="0 0 840 500" xmlns="http://www.w3.org/2000/svg">
                <defs>
                    <!-- Thin V-shape arrowhead -->
                    <marker id="arrowhead1" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto">
                        <polyline points="1,1 8,5 1,9" fill="none" stroke="#000000" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" />
                    </marker>
                </defs>
            </svg>
        </div>

        <div class="divider"></div>

        <!-- SECOND GRAPH (Square A, B, C, D) -->
        <div class="graph-container" style="max-width: 700px;">
            <svg id="graph-svg-2" viewBox="0 0 700 700" xmlns="http://www.w3.org/2000/svg">
                <defs>
                    <!-- Thin V-shape arrowhead -->
                    <marker id="arrowhead2" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto">
                        <polyline points="1,1 8,5 1,9" fill="none" stroke="#000000" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" />
                    </marker>
                </defs>
            </svg>
        </div>

        <div class="divider"></div>

        <!-- THIRD GRAPH (Hourglass A to K) -->
        <div class="graph-container" style="max-width: 600px;">
            <svg id="graph-svg-3" viewBox="0 0 600 600" xmlns="http://www.w3.org/2000/svg">
                <!-- No defs needed for arrowheads since this is an undirected graph -->
            </svg>
        </div>
    </div>

    <script>
        const NODE_RADIUS = 24;

        // --- GRAPH 1 DATA ---
        const nodesData1 = {
            'a': { x: 100, y: 250 },
            'b': { x: 280, y: 130 },
            'c': { x: 280, y: 370 },
            'd': { x: 460, y: 130 },
            'e': { x: 460, y: 370 },
            'f': { x: 640, y: 130 },
            'z': { x: 740, y: 250 }
        };

        const edgesData1 = [
            { source: 'a', target: 'b', weight: 3, nudgeX: -10, nudgeY: -15 },
            { source: 'a', target: 'c', weight: 1, nudgeX: -10, nudgeY: 15 },
            { source: 'b', target: 'd', weight: 4, nudgeX: 0, nudgeY: -15 },
            { source: 'b', target: 'e', weight: 2, nudgeX: -15, nudgeY: -10 },
            { source: 'c', target: 'e', weight: 5, curve: 40, nudgeX: 0, nudgeY: 20 },
            { source: 'd', target: 'f', weight: 3, nudgeX: 0, nudgeY: -15 },
            { source: 'e', target: 'd', weight: 1, curve: -50, nudgeX: -15, nudgeY: 0 },
            { source: 'e', target: 'z', weight: 6, nudgeX: 10, nudgeY: 15 },
            { source: 'f', target: 'z', weight: 4, nudgeX: 15, nudgeY: -10 }
        ];


        // --- GRAPH 2 DATA ---
        const nodesData2 = {
            'A': { x: 200, y: 200 },
            'B': { x: 500, y: 200 },
            'C': { x: 500, y: 500 },
            'D': { x: 200, y: 500 }
        };

        const edgesData2 = [
            { source: 'A', target: 'B', weight: 3, curve: -50, nudgeY: -15 }, // Top Curve
            { source: 'B', target: 'A', weight: 8, curve: -50, nudgeY: 15 },  // Bottom Curve
            { source: 'B', target: 'C', weight: 2, nudgeX: 20, nudgeY: 0 },   // Straight down
            { source: 'C', target: 'D', weight: 1, nudgeX: 0, nudgeY: 20 },   // Straight left
            { source: 'C', target: 'A', weight: 5, nudgeX: 20, nudgeY: -10 }, // Straight diagonal
            { source: 'D', target: 'A', weight: 2, curve: 50, nudgeX: 15 },   // Right curve (inner)
            { source: 'A', target: 'D', weight: 7, curve: 50, nudgeX: -15 }   // Left curve (outer)
        ];


        // --- GRAPH 3 DATA ---
        const nodesData3 = {
            'A': { x: 100, y: 100 },
            'B': { x: 300, y: 100 },
            'C': { x: 500, y: 100 },
            'D': { x: 200, y: 200 },
            'E': { x: 400, y: 200 },
            'F': { x: 300, y: 300 },
            'G': { x: 200, y: 400 },
            'H': { x: 400, y: 400 },
            'I': { x: 100, y: 500 },
            'J': { x: 300, y: 500 },
            'K': { x: 500, y: 500 }
        };

        const edgesData3 = [
            { source: 'A', target: 'B', weight: 4, nudgeY: -10 },
            { source: 'B', target: 'C', weight: 3, nudgeY: -10 },
            { source: 'A', target: 'D', weight: 6, nudgeX: 8, nudgeY: -8 },
            { source: 'B', target: 'D', weight: 7, nudgeX: -8, nudgeY: -8 },
            { source: 'B', target: 'E', weight: 4, nudgeX: 8, nudgeY: -8 },
            { source: 'C', target: 'E', weight: 5, nudgeX: -8, nudgeY: -8 },
            { source: 'D', target: 'E', weight: 8, nudgeY: -10 },
            { source: 'D', target: 'F', weight: 3, nudgeX: 8, nudgeY: -8 },
            { source: 'E', target: 'F', weight: 6, nudgeX: -8, nudgeY: -8 },
            { source: 'F', target: 'G', weight: 2, nudgeX: -8, nudgeY: -8 },
            { source: 'F', target: 'H', weight: 4, nudgeX: 8, nudgeY: -8 },
            { source: 'G', target: 'H', weight: 9, nudgeY: -10 },
            { source: 'G', target: 'I', weight: 5, nudgeX: -8, nudgeY: -8 },
            { source: 'G', target: 'J', weight: 3, nudgeX: 8, nudgeY: -8 },
            { source: 'H', target: 'J', weight: 7, nudgeX: -8, nudgeY: -8 },
            { source: 'H', target: 'K', weight: 6, nudgeX: 8, nudgeY: -8 },
            { source: 'I', target: 'J', weight: 5, nudgeY: -10 },
            { source: 'J', target: 'K', weight: 2, nudgeY: -10 }
        ];


        // --- REUSABLE RENDER FUNCTION ---
        function renderGraph(svgId, markerId, nodesData, edgesData) {
            const svg = document.getElementById(svgId);

            // Step 1: Draw the paths (Edges)
            edgesData.forEach(edge => {
                const p1 = nodesData[edge.source];
                const p2 = nodesData[edge.target];
                const curveOffset = edge.curve || 0;

                let dx = p2.x - p1.x;
                let dy = p2.y - p1.y;
                let dist = Math.sqrt(dx * dx + dy * dy);

                let mx = (p1.x + p2.x) / 2;
                let my = (p1.y + p2.y) / 2;

                let cx = mx;
                let cy = my;
                if (curveOffset !== 0) {
                    let nx = -dy / dist;
                    let ny = dx / dist;
                    cx = mx + nx * curveOffset;
                    cy = my + ny * curveOffset;
                }
                
                let tdx = p2.x - cx;
                let tdy = p2.y - cy;
                let tDist = Math.sqrt(tdx * tdx + tdy * tdy);
                let tnx = tdx / tDist;
                let tny = tdy / tDist;

                // Target endpoint adjusted closer since arrows are thinner
                let ex = p2.x - tnx * (NODE_RADIUS + 1); 
                let ey = p2.y - tny * (NODE_RADIUS + 1);

                let sdx = cx - p1.x;
                let sdy = cy - p1.y;
                let sDist = Math.sqrt(sdx * sdx + sdy * sdy);
                let snx = sdx / sDist;
                let sny = sdy / sDist;

                let sx = p1.x + snx * NODE_RADIUS;
                let sy = p1.y + sny * NODE_RADIUS;

                const path = document.createElementNS("http://www.w3.org/2000/svg", "path");
                path.setAttribute("d", `M ${sx} ${sy} Q ${cx} ${cy} ${ex} ${ey}`);
                path.setAttribute("class", "edge");
                
                // Only add the marker if an ID was passed (makes the graph directed)
                if (markerId) {
                    path.setAttribute("marker-end", `url(#${markerId})`);
                }
                
                svg.appendChild(path);

                let weightX = 0.25 * sx + 0.5 * cx + 0.25 * ex;
                let weightY = 0.25 * sy + 0.5 * cy + 0.25 * ey;

                weightX += edge.nudgeX || 0;
                weightY += edge.nudgeY || 0;

                const text = document.createElementNS("http://www.w3.org/2000/svg", "text");
                text.setAttribute("x", weightX);
                text.setAttribute("y", weightY + 1); 
                text.setAttribute("class", "weight-text");
                text.textContent = edge.weight;
                svg.appendChild(text);
            });

            // Step 2: Draw the Nodes
            Object.keys(nodesData).forEach(nodeId => {
                const pos = nodesData[nodeId];
                const g = document.createElementNS("http://www.w3.org/2000/svg", "g");

                const circle = document.createElementNS("http://www.w3.org/2000/svg", "circle");
                circle.setAttribute("cx", pos.x);
                circle.setAttribute("cy", pos.y);
                circle.setAttribute("r", NODE_RADIUS.toString());
                circle.setAttribute("class", "node");
                g.appendChild(circle);

                const text = document.createElementNS("http://www.w3.org/2000/svg", "text");
                text.setAttribute("x", pos.x);
                text.setAttribute("y", pos.y + 2); 
                text.setAttribute("class", "node-text");
                text.textContent = nodeId;
                g.appendChild(text);

                svg.appendChild(g);
            });
        }

        // Initialize all graphs
        renderGraph('graph-svg-1', 'arrowhead1', nodesData1, edgesData1);
        renderGraph('graph-svg-2', 'arrowhead2', nodesData2, edgesData2);
        renderGraph('graph-svg-3', null, nodesData3, edgesData3); // Null markerId for undirected graph

    </script>
</body>
</html>
