          {
            stepNum: 7, title: "Final Result", pSet: ['a', 'd', 'f', 'c', 'b', 'e', 'z'], tSet: [],
            activeNode: null, evaluatedEdges: [], finalEdges: ['a-d', 'd-f', 'f-z'],
            calculations: ["The shortest path is a → d → f → z"],
            conclusion: "Minimum Cost = 26", distances: { a: '0', b: '24', c: '18', d: '9', e: '24', f: '16', z: '26' }
          }
        ]
      }
    ];

    function App() {
      const [currentExampleId, setCurrentExampleId] = useState(0);
      const [currentStep, setCurrentStep] = useState(0);

      const example = EXAMPLES[currentExampleId];
      
      const stepIndex = Math.min(currentStep, example.steps.length - 1);
      const stepData = example.steps[stepIndex];

      const handleNext = () => setCurrentStep((p) => Math.min(p + 1, example.steps.length - 1));
      const handlePrev = () => setCurrentStep((p) => Math.max(p - 1, 0));
      const handleReset = () => setCurrentStep(0);

      const renderEdges = () => {
        return example.edges.map((edge) => {
          const sourceNode = example.nodes.find(n => n.id === edge.source);
          const targetNode = example.nodes.find(n => n.id === edge.target);
          const isEvaluated = stepData.evaluatedEdges.includes(edge.id);
          const isFinal = stepData.finalEdges.includes(edge.id);

          let strokeColor = "#cbd5e1"; 
          let strokeWidth = 2;
          let strokeClasses = "transition-all duration-500 ease-in-out";
          
          if (isFinal) {
            strokeColor = "#10b981"; 
            strokeWidth = 6;
          } else if (isEvaluated) {
            strokeColor = "#f97316"; 
            strokeWidth = 4;
            strokeClasses += " edge-evaluating"; 
          }

          const midX = (sourceNode.x + targetNode.x) / 2;
          const midY = (sourceNode.y + targetNode.y) / 2;

          return (
            <g key={edge.id}>
              <line
                x1={sourceNode.x} y1={sourceNode.y}
                x2={targetNode.x} y2={targetNode.y}
                stroke={strokeColor} strokeWidth={strokeWidth}
                className={strokeClasses}
              />
              <rect
                x={midX - 12} y={midY - 12}
                width="24" height="24" rx="12" fill="white"
                stroke={isEvaluated ? "#ea580c" : (isFinal ? "#047857" : "transparent")}
                className="transition-colors duration-500"
              />
              <text
                x={midX} y={midY}
                textAnchor="middle" dominantBaseline="central"
                fontSize="13" fontWeight="bold"
                fill={isEvaluated ? "#ea580c" : (isFinal ? "#047857" : "#64748b")}
                className="transition-all duration-500"
              >
                {edge.weight}
              </text>
            </g>
          );
        });
      };

      const renderNodes = () => {
        return example.nodes.map((node) => {
          const isPSet = stepData.pSet.includes(node.id);
          const isActive = stepData.activeNode === node.id;
          
          let fill = "#ffffff", stroke = "#94a3b8", textFill = "#334155";
          
          if (isPSet) {
            fill = "#e0e7ff"; stroke = "#4f46e5"; textFill = "#312e81";
          }
          if (isActive) {
            fill = "#fff7ed"; stroke = "#ea580c"; textFill = "#9a3412";
          }

          const distValue = stepData.distances[node.id];
          const showDist = distValue !== undefined;

          return (
            <g key={node.id}>
              {isActive && (
                <React.Fragment>
                  <circle cx={node.x} cy={node.y} r="28" fill="none" stroke="#fdba74" strokeWidth="6" className="animate-ping opacity-75" />
                  <circle cx={node.x} cy={node.y} r="32" fill="none" stroke="#f97316" strokeWidth="2" className="pulse-glow" />
                </React.Fragment>
              )}
              <circle
                cx={node.x} cy={node.y} r="22"
                fill={fill} stroke={stroke} strokeWidth={isActive ? "4" : "2"}
                className="transition-all duration-500 ease-in-out shadow-sm"
              />
              <text
                x={node.x} y={node.y}
                textAnchor="middle" dominantBaseline="central"
                fontSize="18" fontWeight="bold" fill={textFill}
                className="transition-colors duration-500 font-sans"
              >
                {node.id}
              </text>
              
              {showDist && (
                <g className={`transition-all duration-500 transform ${isActive ? 'scale-110' : 'scale-100'}`} style={{ transformOrigin: `${node.x + 22}px ${node.y - 28}px` }}>
                  <rect 
                    x={node.x + 14} y={node.y - 34} 
                    width={distValue.length > 1 ? 36 : 28} height="22" rx="8" 
                    fill={isActive ? "#ea580c" : (isPSet ? "#10b981" : "#f1f5f9")} 
                    stroke={isActive ? "#9a3412" : (isPSet ? "#047857" : "#cbd5e1")} 
                    strokeWidth="1.5"
                    className="shadow-sm"
                  />
                  <text 
                    x={node.x + (distValue.length > 1 ? 32 : 28)} y={node.y - 23} 
                    textAnchor="middle" dominantBaseline="central" 
                    fontSize="12" fontWeight="bold" 
                    fill={isActive ? "white" : (isPSet ? "white" : "#475569")}
                  >
                    {distValue}
                  </text>
                </g>
              )}
            </g>
          );
        });
      };

      return (
        <div className="min-h-screen bg-slate-50 text-slate-800 font-sans p-4 md:p-8">
          <style>{`
            .edge-evaluating {
              stroke-dasharray: 10 5;
              animation: dashMove 1s linear infinite;
            }
            @keyframes dashMove {
              from { stroke-dashoffset: 30; }
              to { stroke-dashoffset: 0; }
            }
            .pulse-glow {
              animation: glow 2s ease-in-out infinite alternate;
            }
            @keyframes glow {
              0% { stroke-width: 2; opacity: 0.8; }
              100% { stroke-width: 8; opacity: 0.2; }
            }
          `}</style>

          <div className="max-w-[1200px] mx-auto space-y-6">
            
            <header className="bg-white rounded-2xl shadow-sm p-6 border border-slate-200">
              <div className="flex flex-col md:flex-row md:items-center justify-between gap-4 mb-6">
                <div className="flex items-center gap-3">
                  <div className="bg-indigo-600 p-2.5 rounded-xl text-white shadow-md">
                    <Activity size={28} />
                  </div>
                  <div>
                    <h1 className="text-3xl font-bold text-slate-900 leading-tight">Dijkstra's Algorithm Tool</h1>
                    <p className="text-slate-500 font-medium">Interactive Graph Theory Trace</p>
                  </div>
                </div>
                
                <div className="flex gap-2 bg-slate-100 p-1.5 rounded-xl self-start overflow-x-auto">
                  {EXAMPLES.map((ex, idx) => (
                    <button 
                      key={idx}
                      onClick={() => {
                        setCurrentExampleId(idx);
                        setCurrentStep(0);
                      }}
                      className={`flex items-center gap-2 px-4 py-2.5 rounded-lg text-sm font-bold whitespace-nowrap transition-all ${currentExampleId === idx ? 'bg-white text-indigo-700 shadow-sm ring-1 ring-slate-200' : 'text-slate-500 hover:text-slate-700 hover:bg-slate-200/50'}`}
                    >
                      <BookOpen size={16} className={currentExampleId === idx ? 'text-indigo-600' : ''} />
                      Example {idx + 1}
                    </button>
                  ))}
                </div>
              </div>
              
              <div className="bg-indigo-50 border border-indigo-100 rounded-xl p-4 flex flex-col sm:flex-row items-center gap-4 text-sm text-indigo-900">
                 <Info size={24} className="text-indigo-600 shrink-0" />
                 <p>
                   <strong>Core Logic (Relaxation):</strong> At each step, evaluate distances to all Temporary nodes <span className="font-mono bg-white px-1.5 py-0.5 rounded shadow-sm border border-indigo-100">T</span>. 
                   Select node <span className="font-mono bg-white px-1.5 py-0.5 rounded shadow-sm border border-indigo-100">u ∈ T</span> with the smallest distance <span className="font-mono bg-white px-1.5 py-0.5 rounded shadow-sm border border-indigo-100">l(u)</span>, move it to Permanent <span className="font-mono bg-white px-1.5 py-0.5 rounded shadow-sm border border-indigo-100">P</span>, 
                   and update its neighbors: <span className="font-mono font-bold bg-white px-2 py-1 rounded shadow-sm border border-indigo-200 text-indigo-700">l(v) = min( l(v), l(u) + cost(u,v) )</span>
                 </p>
              </div>
            </header>

            <section className="bg-white rounded-2xl shadow-sm border border-slate-200 overflow-hidden flex flex-col">
              
              <div className="bg-slate-800 px-6 py-4 flex flex-wrap items-center justify-between gap-4 text-white">
                <h3 className="font-bold text-lg flex items-center gap-2">
                  <span className="text-indigo-400">{example.title}</span> Trace
                </h3>
                
                <div className="flex gap-2">
                  {currentStep === 0 ? (
                    <button onClick={handleNext} className="bg-indigo-500 hover:bg-indigo-400 text-white px-6 py-2 rounded-xl font-bold flex items-center gap-2 transition-colors shadow-lg shadow-indigo-500/30">
                      <Play size={18} /> Start Algorithm
                    </button>
                  ) : (
                    <React.Fragment>
                      <button onClick={handleReset} className="px-3 py-2 bg-slate-700 hover:bg-slate-600 rounded-xl text-slate-200 hover:text-white transition-colors flex items-center gap-2" title="Reset to Start">
                        <RotateCcw size={18} /> <span className="hidden sm:inline font-semibold text-sm">Reset</span>
                      </button>
                      <button onClick={handlePrev} disabled={currentStep === 0} className="px-4 py-2 bg-slate-700 hover:bg-slate-600 disabled:opacity-50 disabled:cursor-not-allowed rounded-xl text-slate-200 hover:text-white transition-colors flex items-center gap-2 font-semibold text-sm">
                        <SkipBack size={18} /> Previous
                      </button>
                      <button onClick={handleNext} disabled={currentStep === example.steps.length - 1} className="bg-indigo-500 hover:bg-indigo-400 disabled:opacity-50 disabled:cursor-not-allowed text-white px-5 py-2 rounded-xl font-bold flex items-center gap-2 transition-colors shadow-lg shadow-indigo-500/30">
                        Next Step <SkipForward size={18} />
                      </button>
                    </React.Fragment>
                  )}
                </div>
              </div>

              <div className="grid lg:grid-cols-5 divide-y lg:divide-y-0 lg:divide-x divide-slate-200">
                
                <div className="lg:col-span-3 p-2 md:p-6 flex flex-col items-center bg-[radial-gradient(ellipse_at_top,_var(--tw-gradient-stops))] from-slate-50 to-slate-100">
                  <div className="w-full aspect-[16/10] max-h-[450px] relative">
                    <svg viewBox="0 0 800 450" className="w-full h-full drop-shadow-sm" style={{ userSelect: 'none' }}>
                      {renderEdges()}
                      {renderNodes()}
                    </svg>
                  </div>

                  <div className="flex flex-wrap gap-5 mt-4 text-xs font-semibold text-slate-600 justify-center bg-white p-3.5 rounded-2xl border border-slate-200 shadow-sm">
                    <div className="flex items-center gap-2">
                      <span className="w-4 h-4 rounded-full bg-emerald-500 block shadow-inner shadow-emerald-700/50"></span>
                      Permanent Node (P)
                    </div>
                    <div className="flex items-center gap-2">
                      <span className="w-4 h-4 rounded-full bg-orange-500 block ring-4 ring-orange-200"></span>
                      Current Node (u)
                    </div>
                    <div className="flex items-center gap-2">
                      <span className="w-8 h-1.5 rounded-full bg-orange-500 edge-evaluating block"></span>
                      Evaluating Edges
                    </div>
                    <div className="flex items-center gap-2">
                      <span className="w-8 h-1.5 rounded-full bg-emerald-500 block"></span>
                      Shortest Path
                    </div>
                  </div>
                </div>

                <div className="lg:col-span-2 p-6 bg-white flex flex-col h-full">
                  <div className="flex items-center justify-between mb-6 pb-4 border-b border-slate-100">
                    <span className="text-sm font-black text-indigo-600 tracking-widest uppercase bg-indigo-50 px-3 py-1 rounded-lg">
                      {stepData.stepNum === 0 ? 'Setup' : stepData.stepNum === example.steps.length - 1 ? 'Complete' : `Step ${stepData.stepNum} of ${example.steps.length - 2}`}
                    </span>
                    <span className="bg-slate-800 text-white text-xs font-bold px-3 py-1 rounded-lg shadow-sm">
                      Source = a, Dest = z
                    </span>
                  </div>
                  
                  <h3 className="text-3xl font-extrabold text-slate-800 mb-6">{stepData.title}</h3>

                  <div className="flex-1 space-y-6">
                    <div className="grid grid-cols-2 gap-4">
                      <div className="bg-indigo-50/70 rounded-xl p-4 border border-indigo-100 shadow-inner">
                        <p className="text-xs font-bold text-indigo-900 mb-2 uppercase tracking-wide">P (Permanent)</p>
                        <p className="font-mono text-lg text-indigo-700 font-bold">{`{ ${stepData.pSet.join(', ')} }`}</p>
                      </div>
                      <div className="bg-slate-50/70 rounded-xl p-4 border border-slate-200 shadow-inner">
                        <p className="text-xs font-bold text-slate-700 mb-2 uppercase tracking-wide">T (Temporary)</p>
                        <p className="font-mono text-lg text-slate-600 font-bold">{`{ ${stepData.tSet.join(', ')} }`}</p>
                      </div>
                    </div>

                    <div className="bg-slate-800 text-slate-50 rounded-xl p-5 font-mono text-[15px] leading-relaxed shadow-lg ring-1 ring-slate-900/5">
                      <p className="text-slate-400 font-sans font-semibold text-xs uppercase tracking-wider mb-3">Mathematical Evaluation:</p>
                      <ul className="space-y-2.5">
                        {stepData.calculations.map((calc, i) => {
                          const isBold = calc.includes('min') || calc.includes('shortest path');
                          return (
                            <li key={i} className={`flex gap-2 ${isBold ? 'text-orange-300 font-bold' : 'text-slate-200'}`}>
                              <span className="text-slate-500 select-none">›</span> {calc}
                            </li>
                          );
                        })}
                      </ul>
                      <div className="mt-5 pt-4 border-t border-slate-700/80 text-emerald-400 font-bold flex items-start gap-2.5 bg-slate-900/40 p-3 rounded-lg">
                        {stepData.stepNum === example.steps.length - 1 ? <CheckCircle2 size={20} className="shrink-0 text-emerald-400" /> : <div className="mt-1 w-2 h-2 rounded-full bg-emerald-400 shrink-0 shadow-[0_0_8px_rgba(52,211,153,0.8)]" />}
                        {stepData.conclusion}
                      </div>
                    </div>
                  </div>
                </div>

              </div>
            </section>

            <section className="bg-white rounded-2xl shadow-sm border border-slate-200 overflow-hidden">
              <div className="bg-slate-50 px-6 py-4 border-b border-slate-200 flex justify-between items-center">
                <h3 className="font-bold text-slate-800 text-lg">Live Distance Table - <span className="font-mono bg-white px-2 py-0.5 rounded shadow-sm text-indigo-700 text-base border border-slate-200">l(x)</span></h3>
              </div>
              <div className="overflow-x-auto">
                <table className="w-full text-left">
                  <thead className="bg-slate-100/50 text-slate-500 border-b border-slate-200 text-xs uppercase tracking-wider">
                    <tr>
                      <th className="px-8 py-4 font-bold">Node Identifier</th>
                      <th className="px-8 py-4 font-bold">Calculated Distance</th>
                      <th className="px-8 py-4 font-bold">Label Status</th>
                    </tr>
                  </thead>
                  <tbody className="divide-y divide-slate-100">
                    {example.nodes.map(node => (
                      <tr key={node.id} className={`transition-all duration-300 ${stepData.activeNode === node.id ? 'bg-orange-50/60 shadow-inner' : 'hover:bg-slate-50/50'}`}>
                        <td className="px-8 py-3.5">
                           <span className={`inline-flex items-center justify-center w-8 h-8 rounded-full font-mono font-bold text-lg ${stepData.activeNode === node.id ? 'bg-orange-500 text-white' : 'bg-slate-200 text-slate-700'}`}>
                             {node.id}
                           </span>
                        </td>
                        <td className="px-8 py-3.5 font-mono text-lg">
                          <span className={`inline-block px-3 py-1 rounded-md ${stepData.distances[node.id] !== '∞' ? 'bg-indigo-50 text-indigo-700 font-bold ring-1 ring-indigo-200' : 'text-slate-400 font-medium'}`}>
                            {stepData.distances[node.id]}
                          </span>
                        </td>
                        <td className="px-8 py-3.5">
                          {stepData.pSet.includes(node.id) ? (
                            <span className="inline-flex items-center gap-1.5 text-xs font-bold text-emerald-700 bg-emerald-100 px-3 py-1.5 rounded-lg border border-emerald-200">
                              <CheckCircle2 size={14} /> PERMANENT (P)
                            </span>
                          ) : (
                            <span className="inline-flex items-center gap-1.5 text-xs font-bold text-slate-500 bg-slate-100 px-3 py-1.5 rounded-lg border border-slate-200">
                              <span className="w-1.5 h-1.5 rounded-full bg-slate-400"></span> TEMPORARY (T)
                            </span>
                          )}
                        </td>
                      </tr>
                    ))}
                  </tbody>
                </table>
              </div>
            </section>

          </div>
        </div>
      );
    }

    // Render the App component into the DOM
    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
