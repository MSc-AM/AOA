<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Merge Sort Interactive</title>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- React & ReactDOM (Production Minified) -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    
    <!-- Babel for in-browser JSX compilation -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <style>
        body { margin: 0; overflow: hidden; }
        /* Custom scrollbar matching the React version */
        .custom-scrollbar::-webkit-scrollbar { width: 8px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: #f8fafc; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 4px; }
        .custom-scrollbar::-webkit-scrollbar-thumb:hover { background: #94a3b8; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo, useRef } = React;

        // --- ICON COMPONENTS (Replacing lucide-react for standalone HTML) ---
        const Icon = ({ children, className }) => (
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}>
                {children}
            </svg>
        );
        const Play = ({className}) => <Icon className={className}><polygon points="5 3 19 12 5 21 5 3"></polygon></Icon>;
        const Pause = ({className}) => <Icon className={className}><rect x="6" y="4" width="4" height="16"></rect><rect x="14" y="4" width="4" height="16"></rect></Icon>;
        const SkipForward = ({className}) => <Icon className={className}><polygon points="5 4 15 12 5 20 5 4"></polygon><line x1="19" y1="5" x2="19" y2="19"></line></Icon>;
        const ChevronRight = ({className}) => <Icon className={className}><polyline points="9 18 15 12 9 6"></polyline></Icon>;
        const ChevronLeft = ({className}) => <Icon className={className}><polyline points="15 18 9 12 15 6"></polyline></Icon>;
        const RotateCcw = ({className}) => <Icon className={className}><polyline points="1 4 1 10 7 10"></polyline><path d="M3.51 15a9 9 0 1 0 2.13-9.36L1 10"></path></Icon>;
        const BookOpen = ({className}) => <Icon className={className}><path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z"></path><path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"></path></Icon>;
        const Code2 = ({className}) => <Icon className={className}><path d="m18 16 4-4-4-4"></path><path d="m6 8-4 4 4 4"></path><path d="m14.5 4-5 16"></path></Icon>;
        const Info = ({className}) => <Icon className={className}><circle cx="12" cy="12" r="10"></circle><line x1="12" y1="16" x2="12" y2="12"></line><line x1="12" y1="8" x2="12.01" y2="8"></line></Icon>;
        const LayoutTemplate = ({className}) => <Icon className={className}><rect x="3" y="3" width="18" height="7" rx="2" ry="2"></rect><rect x="3" y="14" width="9" height="7" rx="2" ry="2"></rect><rect x="16" y="14" width="5" height="7" rx="2" ry="2"></rect></Icon>;
        const Clock = ({className}) => <Icon className={className}><circle cx="12" cy="12" r="10"></circle><polyline points="12 6 12 12 16 14"></polyline></Icon>;
        const Database = ({className}) => <Icon className={className}><ellipse cx="12" cy="5" rx="9" ry="3"></ellipse><path d="M21 12c0 1.66-4 3-9 3s-9-1.34-9-3"></path><path d="M3 5v14c0 1.66 4 3 9 3s9-1.34 9-3V5"></path></Icon>;

        // --- CORE ALGORITHM & STEP GENERATOR ---
        function generateMergeSortSteps(initialArray) {
            const steps = [];
            const currentNodes = {};

            function initNodes(start, end) {
                const id = `${start}-${end}`;
                currentNodes[id] = { 
                    values: Array(end - start + 1).fill(null), 
                    visible: false, 
                    status: 'idle',
                    activeIndex: null 
                };
                if (start === end) return;
                const mid = Math.floor((start + end) / 2);
                initNodes(start, mid);
                initNodes(mid + 1, end);
            }
            initNodes(0, initialArray.length - 1);
            
            currentNodes[`0-${initialArray.length - 1}`] = { 
                values: [...initialArray], 
                visible: true, 
                status: 'idle',
                activeIndex: null
            };

            function pushStep(title, desc, highlightIds = []) {
                steps.push({
                    title,
                    desc,
                    nodes: JSON.parse(JSON.stringify(currentNodes)),
                    highlightIds
                });
            }

            pushStep(
                "1. The Problem Setup", 
                `We are given an unsorted array of ${initialArray.length} elements. The algorithm will process these operations in a Depth-First order, meaning it will keep splitting the left side over and over until it hits single elements.`, 
                [`0-${initialArray.length - 1}`]
            );

            function splitAndMerge(start, end) {
                const nodeId = `${start}-${end}`;

                if (start === end) {
                    currentNodes[nodeId].status = 'sorted';
                    pushStep(
                        "Base Case Reached", 
                        `Condition: left (${start}) >= right (${end}). We return immediately. The element [${currentNodes[nodeId].values[0]}] is successfully isolated and inherently sorted.`, 
                        [nodeId]
                    );
                    return [...currentNodes[nodeId].values];
                }

                const mid = Math.floor((start + end) / 2);
                const leftId = `${start}-${mid}`;
                const rightId = `${mid + 1}-${end}`;

                currentNodes[nodeId].status = 'splitting';
                pushStep(
                    "Calculating Midpoint", 
                    `splitarray(arr, ${start}, ${end}): Condition ${start} >= ${end} is false. Calculate mid = floor((${start} + ${end}) / 2) = ${mid}.`, 
                    [nodeId]
                );

                currentNodes[leftId].values = currentNodes[nodeId].values.slice(0, mid - start + 1);
                currentNodes[leftId].visible = true;
                currentNodes[rightId].values = currentNodes[nodeId].values.slice(mid - start + 1);
                currentNodes[rightId].visible = true;

                pushStep(
                    "Splitting the Array", 
                    `The array is logically divided into two parts. Left part: Indices ${start} to ${mid}. Right part: Indices ${mid+1} to ${end}.`, 
                    [nodeId, leftId, rightId]
                );

                pushStep(
                    "Depth-First Focus (Left)", 
                    `The algorithm pauses the current step and recursively calls splitarray for the LEFT part (${start} to ${mid}).`, 
                    [leftId]
                );

                const leftSorted = splitAndMerge(start, mid);

                pushStep(
                    "Depth-First Focus (Right)", 
                    `The left part is fully broken down. The computer now backtracks and processes the RIGHT part (${mid + 1} to ${end}).`, 
                    [rightId]
                );

                const rightSorted = splitAndMerge(mid + 1, end);

                currentNodes[nodeId].status = 'merging';
                currentNodes[nodeId].values = Array(end - start + 1).fill(null);
                pushStep(
                    "Begin Merge Phase", 
                    `mergeParts(arr, ${start}, ${mid}, ${end}): We now have two sorted temporary arrays, L and R. We will compare them element by element.`, 
                    [leftId, rightId, nodeId]
                );

                let merged = [];
                let i = 0, j = 0;

                while(i < leftSorted.length && j < rightSorted.length) {
                    currentNodes[leftId].activeIndex = i;
                    currentNodes[rightId].activeIndex = j;
                    
                    let leftVal = leftSorted[i];
                    let rightVal = rightSorted[j];
                    
                    pushStep(
                        "Comparison", 
                        `Comparing L[${i}] (${leftVal}) and R[${j}] (${rightVal}). Which is smaller?`, 
                        [nodeId, leftId, rightId]
                    );

                    if (leftVal <= rightVal) {
                        merged.push(leftVal);
                        currentNodes[nodeId].values = [...merged, ...Array((end-start+1) - merged.length).fill(null)];
                        currentNodes[leftId].values[i] = null;
                        pushStep("Merge Smaller Element", `L[i] (${leftVal}) is smaller or equal. Place it in the main array and move the left pointer forward.`, [nodeId, leftId]);
                        i++;
                    } else {
                        merged.push(rightVal);
                        currentNodes[nodeId].values = [...merged, ...Array((end-start+1) - merged.length).fill(null)];
                        currentNodes[rightId].values[j] = null;
                        pushStep("Merge Smaller Element", `R[j] (${rightVal}) is smaller. Place it in the main array and move the right pointer forward.`, [nodeId, rightId]);
                        j++;
                    }
                }

                currentNodes[leftId].activeIndex = null;
                currentNodes[rightId].activeIndex = null;

                while(i < leftSorted.length) {
                    currentNodes[leftId].activeIndex = i;
                    merged.push(leftSorted[i]);
                    currentNodes[nodeId].values = [...merged, ...Array((end-start+1) - merged.length).fill(null)];
                    currentNodes[leftId].values[i] = null;
                    pushStep("Copy Remaining Elements", `Right bucket is empty. Copying remaining element (${leftSorted[i]}) from the Left bucket.`, [nodeId, leftId]);
                    i++;
                }
                
                while(j < rightSorted.length) {
                    currentNodes[rightId].activeIndex = j;
                    merged.push(rightSorted[j]);
                    currentNodes[nodeId].values = [...merged, ...Array((end-start+1) - merged.length).fill(null)];
                    currentNodes[rightId].values[j] = null;
                    pushStep("Copy Remaining Elements", `Left bucket is empty. Copying remaining element (${rightSorted[j]}) from the Right bucket.`, [nodeId, rightId]);
                    j++;
                }

                currentNodes[nodeId].status = 'sorted';
                currentNodes[leftId].visible = false;
                currentNodes[rightId].visible = false;

                pushStep(
                    "Merge Complete", 
                    `Subarray from index ${start} to ${end} is now sorted: [${merged.join(', ')}].`, 
                    [nodeId]
                );

                return merged;
            }

            splitAndMerge(0, initialArray.length - 1);

            pushStep(
                "Algorithm Complete!", 
                `All elements have been successfully merged. The entire array is now sorted using the Divide and Conquer strategy.`, 
                [`0-${initialArray.length - 1}`]
            );

            return steps;
        }

        // --- COMPONENTS ---
        const ArrayCell = ({ val, isActive, isFaded }) => {
            return (
                <div className={`
                    w-12 h-12 flex items-center justify-center m-1 border-2 rounded-lg text-xl font-bold transition-all duration-300
                    ${isActive ? 'bg-amber-300 border-amber-500 scale-110 shadow-md text-amber-900 z-10' : 
                        val !== null ? 'bg-slate-50 border-slate-300 text-slate-800 shadow-sm' : 
                        'bg-slate-100/50 border-dashed border-slate-300 text-transparent'}
                    ${isFaded ? 'opacity-30' : 'opacity-100'}
                `}>
                    {val !== null ? val : '0'}
                </div>
            );
        };

        const TreeNode = ({ node, id, highlightIds }) => {
            if (!node || !node.visible) {
                return <div className="invisible" style={{ minWidth: '80px', margin: '0 8px' }} />;
            }
            
            const isHighlighted = highlightIds.includes(id);
            const statusColors = {
                idle: 'border-slate-300 bg-white',
                splitting: 'border-blue-400 bg-blue-50',
                merging: 'border-purple-400 bg-purple-50',
                sorted: 'border-emerald-400 bg-emerald-50'
            };

            return (
                <div className={`
                    transition-all duration-500 flex flex-col items-center mx-2
                    ${isHighlighted ? 'scale-105 z-10' : 'scale-100 opacity-90'}
                `}>
                    <div className={`
                        flex border-2 p-1.5 rounded-xl shadow-lg transition-colors duration-300
                        ${isHighlighted ? 'shadow-xl ring-4 ring-blue-100 ring-opacity-50' : 'shadow-md'}
                        ${statusColors[node.status]}
                    `}>
                        {node.values.map((val, idx) => (
                            <ArrayCell 
                                key={`${id}-${idx}`} 
                                val={val} 
                                isActive={node.activeIndex === idx}
                                isFaded={val === null}
                            />
                        ))}
                    </div>
                </div>
            );
        };

        function App() {
            const initialArray = [38, 27, 43, 3, 9, 82, 10, 19];
            const steps = useMemo(() => generateMergeSortSteps(initialArray), []);
            
            const [currentStep, setCurrentStep] = useState(0);
            const [isPlaying, setIsPlaying] = useState(false);
            
            const stepData = steps[currentStep];

            useEffect(() => {
                let timer;
                if (isPlaying && currentStep < steps.length - 1) {
                    timer = setTimeout(() => {
                        setCurrentStep(prev => prev + 1);
                    }, 1500);
                } else if (currentStep >= steps.length - 1) {
                    setIsPlaying(false);
                }
                return () => clearTimeout(timer);
            }, [isPlaying, currentStep, steps.length]);

            const handleNext = () => setCurrentStep(Math.min(steps.length - 1, currentStep + 1));
            const handlePrev = () => setCurrentStep(Math.max(0, currentStep - 1));
            const handleReset = () => { setCurrentStep(0); setIsPlaying(false); };

            return (
                <div className="flex h-screen w-screen bg-slate-100 overflow-hidden font-sans text-slate-800">
                    
                    {/* LEFT SIDEBAR */}
                    <div className="w-1/3 min-w-[450px] max-w-[550px] bg-white border-r border-slate-200 shadow-2xl z-20 flex flex-col h-full">
                        <div className="p-6 bg-slate-800 text-white shadow-md">
                            <h1 className="text-3xl font-extrabold tracking-tight mb-2">Merge Sort Algorithm</h1>
                            <p className="text-slate-300 text-sm font-medium">A Detailed Analysis of Splitting & Merging Phases</p>
                        </div>

                        <div className="flex-1 overflow-y-auto p-6 space-y-8 custom-scrollbar">
                            <section>
                                <h2 className="text-xl font-bold flex items-center text-indigo-700 mb-3 border-b pb-2">
                                    <BookOpen className="w-5 h-5 mr-2" /> Introduction
                                </h2>
                                <p className="text-sm leading-relaxed text-slate-600">
                                    Merge Sort is a classic <strong>"Divide and Conquer"</strong> sorting algorithm. It works by dividing an unsorted array into smaller subarrays until each subarray contains only a single element (which is inherently sorted). After the splitting is complete, it merges these small arrays back together in sorted order.
                                </p>
                            </section>

                            <section>
                                <h2 className="text-xl font-bold flex items-center text-teal-700 mb-3 border-b pb-2">
                                    <Clock className="w-5 h-5 mr-2" /> Complexity Analysis
                                </h2>
                                <div className="space-y-4">
                                    <div className="bg-slate-50 border border-slate-200 rounded-lg p-4 shadow-sm">
                                        <h3 className="font-bold text-slate-700 mb-2 flex items-center border-b pb-1">
                                            <Clock className="w-4 h-4 mr-2 text-slate-500" /> Time Complexity
                                        </h3>
                                        <ul className="text-sm text-slate-700 space-y-2 mt-2">
                                            <li className="flex justify-between items-center"><span className="font-semibold text-emerald-600">Best Case:</span> <span className="font-mono bg-white px-2 py-0.5 rounded border border-slate-200">O(n log n)</span></li>
                                            <li className="flex justify-between items-center"><span className="font-semibold text-amber-600">Average Case:</span> <span className="font-mono bg-white px-2 py-0.5 rounded border border-slate-200">O(n log n)</span></li>
                                            <li className="flex justify-between items-center"><span className="font-semibold text-red-600">Worst Case:</span> <span className="font-mono bg-white px-2 py-0.5 rounded border border-slate-200">O(n log n)</span></li>
                                        </ul>
                                        <p className="text-xs text-slate-500 mt-3 italic">
                                            Merge Sort always divides the array in half (<span className="font-mono">log n</span> steps) and merges them in linear time (<span className="font-mono">n</span> steps), regardless of the initial order of elements.
                                        </p>
                                    </div>
                                    
                                    <div className="bg-slate-50 border border-slate-200 rounded-lg p-4 shadow-sm">
                                        <h3 className="font-bold text-slate-700 mb-2 flex items-center border-b pb-1">
                                            <Database className="w-4 h-4 mr-2 text-slate-500" /> Space Complexity
                                        </h3>
                                        <ul className="text-sm text-slate-700 space-y-2 mt-2">
                                            <li className="flex justify-between items-center"><span className="font-semibold text-blue-600">Worst Case:</span> <span className="font-mono bg-white px-2 py-0.5 rounded border border-slate-200">O(n)</span></li>
                                        </ul>
                                        <p className="text-xs text-slate-500 mt-3 italic">
                                            Temporary arrays (<span className="font-mono">L</span> and <span className="font-mono">R</span> buckets) are created during the merge phase to hold the copied data, requiring extra memory proportional to the array size.
                                        </p>
                                    </div>
                                </div>
                            </section>

                            <section>
                                <h2 className="text-xl font-bold flex items-center text-blue-700 mb-3 border-b pb-2">
                                    <Code2 className="w-5 h-5 mr-2" /> Part 1: Splitting Phase
                                </h2>
                                <div className="bg-slate-50 border border-slate-200 rounded-lg p-4 text-sm font-mono text-slate-700 overflow-x-auto">
                                    <span className="text-blue-600 font-bold">Function</span> splitarray(arr, left, right)<br/><br/>
                                    <span className="text-slate-400 italic">// 1. Base Case: Check if dividable</span><br/>
                                    &nbsp;&nbsp;<span className="text-purple-600 font-bold">if</span> left &gt;= right <span className="text-purple-600 font-bold">Return</span><br/><br/>
                                    <span className="text-slate-400 italic">// 2. Find the middle index</span><br/>
                                    &nbsp;&nbsp;mid = floor( (left + right) / 2 )<br/><br/>
                                    <span className="text-slate-400 italic">// 3. Recursively split Left part</span><br/>
                                    &nbsp;&nbsp;<span className="text-blue-600 font-bold">Call</span> splitarray(arr, left, mid)<br/><br/>
                                    <span className="text-slate-400 italic">// 4. Recursively split Right part</span><br/>
                                    &nbsp;&nbsp;<span className="text-blue-600 font-bold">Call</span> splitarray(arr, mid + 1, right)<br/><br/>
                                    <span className="text-slate-400 italic">// 5. Merge the sorted parts</span><br/>
                                    &nbsp;&nbsp;<span className="text-blue-600 font-bold">Call</span> mergeParts(arr, left, mid, right)<br/>
                                    <span className="text-blue-600 font-bold">End Function</span>
                                </div>
                                <p className="text-xs text-slate-500 mt-3 italic">
                                    <strong>Note:</strong> The algorithm processes in a <strong>Depth-First order</strong>. It keeps splitting the left side until it hits single elements before it ever looks at the right side!
                                </p>
                            </section>

                            <section>
                                <h2 className="text-xl font-bold flex items-center text-purple-700 mb-3 border-b pb-2">
                                    <LayoutTemplate className="w-5 h-5 mr-2" /> Part 2: Merge Phase
                                </h2>
                                <div className="bg-slate-50 border border-slate-200 rounded-lg p-4 text-sm font-mono text-slate-700 overflow-x-auto">
                                    <span className="text-blue-600 font-bold">Function</span> mergeParts(arr, left, mid, right)<br/><br/>
                                    <span className="text-slate-400 italic">// 1. Calc sizes & Create temp arrays</span><br/>
                                    &nbsp;&nbsp;n1 = mid - left + 1; n2 = right - mid<br/>
                                    &nbsp;&nbsp;Create Array L[n1], R[n2]<br/><br/>
                                    <span className="text-slate-400 italic">// 2. Copy data to L and R, set pointers</span><br/>
                                    &nbsp;&nbsp;i = 0, j = 0, k = left<br/><br/>
                                    <span className="text-slate-400 italic">// 3. Compare and Merge</span><br/>
                                    &nbsp;&nbsp;<span className="text-purple-600 font-bold">While</span> i &lt; n1 AND j &lt; n2<br/>
                                    &nbsp;&nbsp;&nbsp;&nbsp;<span className="text-purple-600 font-bold">If</span> L[i] &lt;= R[j]<br/>
                                    &nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;arr[k] = L[i]; i++<br/>
                                    &nbsp;&nbsp;&nbsp;&nbsp;<span className="text-purple-600 font-bold">Else</span><br/>
                                    &nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;arr[k] = R[j]; j++<br/>
                                    &nbsp;&nbsp;&nbsp;&nbsp;k++<br/><br/>
                                    <span className="text-slate-400 italic">// 4. Copy remaining elements</span><br/>
                                    &nbsp;&nbsp;Copy remaining of L[] if any<br/>
                                    &nbsp;&nbsp;Copy remaining of R[] if any<br/>
                                    <span className="text-blue-600 font-bold">End Function</span>
                                </div>
                            </section>
                            <div className="pb-10"></div>
                        </div>
                    </div>

                    {/* RIGHT MAIN AREA */}
                    <div className="flex-1 flex flex-col relative h-full">
                        
                        <div className="bg-white px-8 py-4 shadow-sm flex justify-between items-center z-10 border-b border-slate-200">
                            <div className="flex items-center text-slate-500 font-medium">
                                <Info className="w-5 h-5 mr-2 text-indigo-500" />
                                Interactive Visualization Array: [38, 27, 43, 3, 9, 82, 10, 19]
                            </div>
                            <div className="bg-slate-100 px-4 py-1.5 rounded-full text-sm font-bold text-slate-600 border border-slate-200">
                                Step {currentStep + 1} of {steps.length}
                            </div>
                        </div>

                        <div className="flex-1 overflow-hidden bg-slate-50/50 p-8 flex items-center justify-center">
                            <div className="w-full max-w-6xl h-full flex flex-col justify-between items-center py-4 relative">
                                <div className="flex w-full justify-center">
                                    <TreeNode node={stepData.nodes["0-7"]} id="0-7" highlightIds={stepData.highlightIds} />
                                </div>
                                <div className="flex w-full justify-around px-[10%] mt-8">
                                    <TreeNode node={stepData.nodes["0-3"]} id="0-3" highlightIds={stepData.highlightIds} />
                                    <TreeNode node={stepData.nodes["4-7"]} id="4-7" highlightIds={stepData.highlightIds} />
                                </div>
                                <div className="flex w-full justify-between px-[5%] mt-8">
                                    <TreeNode node={stepData.nodes["0-1"]} id="0-1" highlightIds={stepData.highlightIds} />
                                    <TreeNode node={stepData.nodes["2-3"]} id="2-3" highlightIds={stepData.highlightIds} />
                                    <TreeNode node={stepData.nodes["4-5"]} id="4-5" highlightIds={stepData.highlightIds} />
                                    <TreeNode node={stepData.nodes["6-7"]} id="6-7" highlightIds={stepData.highlightIds} />
                                </div>
                                <div className="flex w-full justify-between mt-8">
                                    <TreeNode node={stepData.nodes["0-0"]} id="0-0" highlightIds={stepData.highlightIds} />
                                    <TreeNode node={stepData.nodes["1-1"]} id="1-1" highlightIds={stepData.highlightIds} />
                                    <TreeNode node={stepData.nodes["2-2"]} id="2-2" highlightIds={stepData.highlightIds} />
                                    <TreeNode node={stepData.nodes["3-3"]} id="3-3" highlightIds={stepData.highlightIds} />
                                    <TreeNode node={stepData.nodes["4-4"]} id="4-4" highlightIds={stepData.highlightIds} />
                                    <TreeNode node={stepData.nodes["5-5"]} id="5-5" highlightIds={stepData.highlightIds} />
                                    <TreeNode node={stepData.nodes["6-6"]} id="6-6" highlightIds={stepData.highlightIds} />
                                    <TreeNode node={stepData.nodes["7-7"]} id="7-7" highlightIds={stepData.highlightIds} />
                                </div>
                            </div>
                        </div>

                        <div className="bg-white border-t-2 border-slate-200 p-6 flex flex-col z-10 shadow-[0_-10px_40px_-15px_rgba(0,0,0,0.1)]">
                            <div className="mb-6 max-w-4xl mx-auto w-full text-center">
                               <h3 className={`text-2xl font-bold mb-3 transition-colors duration-300
                                 ${stepData.title.includes("Merge") ? 'text-purple-700' : 
                                   stepData.title.includes("Split") || stepData.title.includes("Focus") ? 'text-blue-700' : 
                                   stepData.title.includes("Complete") || stepData.title.includes("Base") ? 'text-emerald-700' : 
                                   'text-slate-800'}
                               `}>
                                  {stepData.title}
                               </h3>
                               <p className="text-lg text-slate-600 leading-relaxed font-medium bg-slate-50 py-3 px-6 rounded-lg inline-block border border-slate-100 shadow-sm">
                                  {stepData.desc}
                               </p>
                            </div>

                            <div className="flex justify-center items-center space-x-6 w-full max-w-2xl mx-auto">
                                <button onClick={handleReset} className="p-3 rounded-full hover:bg-slate-100 text-slate-500 transition-colors" title="Reset">
                                    <RotateCcw className="w-6 h-6" />
                                </button>
                                <button onClick={handlePrev} disabled={currentStep === 0} className="flex items-center px-6 py-3 bg-white border-2 border-slate-300 text-slate-700 rounded-full font-bold shadow-sm hover:bg-slate-50 hover:border-slate-400 disabled:opacity-50 disabled:cursor-not-allowed transition-all">
                                    <ChevronLeft className="w-5 h-5 mr-2" /> Prev Step
                                </button>
                                <button onClick={() => setIsPlaying(!isPlaying)} className={`flex items-center justify-center w-16 h-16 rounded-full text-white shadow-lg transition-transform hover:scale-105 active:scale-95 ${isPlaying ? 'bg-amber-500 hover:bg-amber-600' : 'bg-indigo-600 hover:bg-indigo-700'}`} title={isPlaying ? "Pause Auto-play" : "Play Auto-play"}>
                                    {isPlaying ? <Pause className="w-8 h-8" /> : <Play className="w-8 h-8 ml-1" />}
                                </button>
                                <button onClick={handleNext} disabled={currentStep === steps.length - 1} className="flex items-center px-6 py-3 bg-indigo-600 text-white rounded-full font-bold shadow-md hover:bg-indigo-700 disabled:opacity-50 disabled:cursor-not-allowed transition-all hover:shadow-lg">
                                    Next Step <ChevronRight className="w-5 h-5 ml-2" />
                                </button>
                                <button onClick={() => {setCurrentStep(steps.length - 1); setIsPlaying(false);}} className="p-3 rounded-full hover:bg-slate-100 text-slate-500 transition-colors" title="Skip to End">
                                    <SkipForward className="w-6 h-6" />
                                </button>
                            </div>
                            
                            <div className="w-full max-w-4xl mx-auto mt-6 bg-slate-200 h-2 rounded-full overflow-hidden">
                                <div className="h-full bg-indigo-500 transition-all duration-300 ease-out" style={{ width: `${((currentStep) / (steps.length - 1)) * 100}%` }}></div>
                            </div>
                        </div>

                    </div>
                </div>
            );
        }

        // Render the React application
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
